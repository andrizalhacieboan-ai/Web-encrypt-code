<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encrypt Code Andri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/javascript-obfuscator/dist/index.browser.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.14.9/beautify.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darker: '#080e14',
                        dark: '#111827',
                        primary: '#00b4ff',
                        primaryHover: '#008ecc',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
            overflow-x: hidden;
        }
        
        textarea {
            -webkit-user-select: text;
            -ms-user-select: text;
            user-select: text;
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .drop-zone--over {
            border-color: #00b4ff !important;
            background: rgba(0, 180, 255, 0.05) !important;
        }

        @keyframes pulse-border {
            0% { border-color: rgba(0, 180, 255, 0.3); }
            50% { border-color: rgba(0, 180, 255, 1); }
            100% { border-color: rgba(0, 180, 255, 0.3); }
        }

        .security-active {
            animation: pulse-border 2s infinite;
        }
    </style>
</head>
<body class="bg-darker text-slate-300 min-h-screen font-sans flex flex-col">

    <!-- Header -->
    <nav class="glass-panel sticky top-0 z-50 px-6 py-4 flex items-center justify-between border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center text-darker shadow-[0_0_15px_rgba(0,180,255,0.4)]">
                <i class="fa-solid fa-shield-halved text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold text-white tracking-tight">Encrypt <span class="text-primary text-sm font-mono">Code Andri</span></h1>
            </div>
        </div>
        <div class="hidden md:flex items-center gap-6">
            <div class="flex items-center gap-2 text-xs font-mono text-primary bg-primary/10 px-3 py-1 rounded-full border border-primary/20">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
                </span>
                ANTI-BYPASS ACTIVE
            </div>
        </div>
    </nav>

    <main class="flex-1 container mx-auto px-4 py-8 flex flex-col gap-6">
        
        <!-- Dashboard Controls -->
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <div class="lg:col-span-1 glass-panel rounded-xl p-5 border-l-4 border-l-primary flex flex-col gap-4">
                <h3 class="text-sm font-bold text-white uppercase tracking-wider">Konfigurasi</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-slate-500 uppercase block mb-1">Mode</label>
                        <div class="grid grid-cols-2 gap-2 bg-black/40 p-1 rounded-lg">
                            <button onclick="setMode('js')" id="btn-js" class="py-2 rounded-md bg-primary text-darker font-bold text-xs transition-all">JS</button>
                            <button onclick="setMode('html')" id="btn-html" class="py-2 rounded-md text-slate-400 font-bold text-xs transition-all hover:text-white">HTML</button>
                        </div>
                    </div>

                    <div id="js-options">
                        <label class="text-[10px] text-slate-500 uppercase block mb-1">Algoritma Enkripsi</label>
                        <select id="encrypt-type" class="w-full bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-primary">
                            <option value="andri">Andri Special</option>
                            <option value="high">Obfuscator: High Intensity</option>
                            <option value="quantum">Quantum Shield</option>
                            <option value="nebula">Nebula Multi-String</option>
                            <option value="max">Hardcore Obfuscation</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Upload Zone -->
            <div class="lg:col-span-3">
                <div id="drop-zone" class="h-full border-2 border-dashed border-white/10 rounded-xl flex flex-col items-center justify-center p-6 transition-all cursor-pointer hover:border-primary/50 bg-white/[0.02]">
                    <input type="file" id="file-input" class="hidden" accept=".js,.html,.txt">
                    <div id="upload-content" class="text-center">
                        <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-4 text-primary group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                        </div>
                        <h4 class="text-white font-semibold">Klik atau Upload File</h4>
                        <p class="text-xs text-slate-500 mt-1">Mendukung .js, .html, .txt</p>
                    </div>
                    <div id="file-info" class="hidden text-center">
                        <div class="flex items-center gap-3 bg-primary/20 border border-primary/30 px-4 py-2 rounded-lg text-primary">
                            <i class="fa-solid fa-file-code"></i>
                            <span id="file-name" class="font-mono text-sm">filename.js</span>
                            <button onclick="removeFile(event)" class="hover:text-white"><i class="fa-solid fa-circle-xmark"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Editor Area -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 flex-1 min-h-[450px]">
            <!-- Input -->
            <div class="glass-panel rounded-xl flex flex-col overflow-hidden border-t-2 border-t-slate-700">
                <div class="bg-white/[0.03] px-4 py-3 flex justify-between items-center border-b border-white/5">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="fa-solid fa-terminal text-primary"></i> Source Code
                    </span>
                    <button onclick="clearAll()" class="text-[10px] text-red-400 hover:underline uppercase font-bold">Reset</button>
                </div>
                <textarea id="input-code" spellcheck="false" class="flex-1 w-full bg-transparent p-6 text-sm font-mono text-slate-400 resize-none focus:outline-none" placeholder="Ketik kode di sini atau upload file di atas..."></textarea>
            </div>

            <!-- Output -->
            <div class="glass-panel rounded-xl flex flex-col overflow-hidden border-t-2 border-t-primary">
                <div class="bg-white/[0.03] px-4 py-3 flex justify-between items-center border-b border-white/5">
                    <span class="text-xs font-bold text-primary uppercase tracking-widest flex items-center gap-2">
                        <i class="fa-solid fa-microchip"></i> Output Secure
                    </span>
                    <button onclick="copyOutput()" class="bg-primary hover:bg-primaryHover text-darker px-4 py-1 rounded font-bold text-[10px] transition-all uppercase">Salin Kode</button>
                </div>
                <textarea id="output-code" spellcheck="false" readonly class="flex-1 w-full bg-transparent p-6 text-sm font-mono text-primary resize-none focus:outline-none" placeholder="Hasil akan muncul di sini..."></textarea>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="flex justify-center gap-4">
            <button onclick="handleProcess('decrypt')" class="px-10 py-4 rounded-xl border border-white/10 hover:bg-white/5 text-white font-bold transition-all flex items-center gap-3">
                <i class="fa-solid fa-unlock-keyhole"></i> DECRYPT
            </button>
            <button onclick="handleProcess('encrypt')" class="px-12 py-4 rounded-xl bg-primary hover:bg-primaryHover text-darker font-black shadow-[0_0_30px_rgba(0,180,255,0.3)] transition-all flex items-center gap-3">
                <i class="fa-solid fa-shield-virus"></i> EXECUTE ENCRYPT
            </button>
        </div>

    </main>

    <!-- Notification Toast -->
    <div id="toast-container" class="fixed top-24 right-5 flex flex-col gap-2 z-[100]"></div>

    <!-- ========================================== -->
    <!-- 🛡️ HIGH-END SECURITY ENGINE 🛡️ -->
    <!-- ========================================== -->
    <script>
        (function() {
            "use strict";

            // Anti-Get Code: Proteksi Keyboard & Mouse
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && ['U','S'].includes(e.key))) {
                    e.preventDefault();
                    notify("SECURITY Aksi Terlarang Terdeteksi!", "error");
                }
            });

            function terminate(reason) {
                document.body.innerHTML = `
                    <div style="height:100vh; background:#000; color:#00b4ff; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:monospace;">
                        <div style="border:1px solid #00b4ff; padding:40px; text-align:center; box-shadow: 0 0 20px #00b4ff;">
                            <h1 style="margin:0; font-size:24px;">[SECURITY_CRITICAL_FAILURE]</h1>
                            <p style="margin-top:20px; color:#fff;">Sistem mengunci diri karena potensi pelanggaran:</p>
                            <p style="background:#111; padding:10px; border-radius:4px;">${reason}</p>
                            <p style="font-size:10px; color:#444; margin-top:20px;">IP Address & Metadata Telah Dicatat.</p>
                        </div>
                    </div>`;
                throw new Error("SEC_HALT");
            }

            // Anti-DevTools
            let threshold = 160;
            setInterval(() => {
                let devtoolsOpen = (window.outerWidth - window.innerWidth > threshold) || (window.outerHeight - window.innerHeight > threshold);
                if (devtoolsOpen) terminate("SECURITY Inspect Element Terdeteksi");
            }, 1000);

            // Debugger Trap
            setInterval(() => {
                let s = performance.now();
                debugger;
                if (performance.now() - s > 150) terminate("Debugger/Breakpoint Terdeteksi");
            }, 1000);

            // Integrity Check
            function coreCheck() { return "ANDRI_SECURITY_V2"; }
            const _h = btoa(coreCheck.toString());
            setInterval(() => {
                if (btoa(coreCheck.toString()) !== _h) terminate("Tampering di Core Logic");
                console.clear();
                console.log("%c[SECURE]%c Protected by Andri Systems", "color:black;background:#00b4ff;padding:4px;font-weight:bold;", "color:#00b4ff;");
            }, 3000);
        })();
    </script>

    <!-- ========================================== -->
    <!-- ⚙️ LOGIKA APLIKASI ⚙️ -->
    <!-- ========================================== -->
    <script>
        let currentMode = 'js';

        // --- File Upload Logic ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadContent = document.getElementById('upload-content');
        const fileInfo = document.getElementById('file-info');
        const fileNameDisplay = document.getElementById('file-name');
        const inputCode = document.getElementById('input-code');

        dropZone.onclick = () => fileInput.click();

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drop-zone--over');
        });

        ['dragleave', 'dragend'].forEach(type => {
            dropZone.addEventListener(type, () => dropZone.classList.remove('drop-zone--over'));
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drop-zone--over');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.onchange = (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        };

        function handleFile(file) {
            const validExtensions = ['.js', '.html', '.txt'];
            const ext = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            
            if (!validExtensions.includes(ext)) {
                notify("Format file tidak didukung!", "error");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                inputCode.value = e.target.result;
                fileNameDisplay.textContent = file.name;
                uploadContent.classList.add('hidden');
                fileInfo.classList.remove('hidden');
                notify("File berhasil dimuat!");
                
                // Auto set mode based on extension
                if (ext === '.html') setMode('html');
                else if (ext === '.js') setMode('js');
            };
            reader.readAsText(file);
        }

        function removeFile(e) {
            e.stopPropagation();
            fileInput.value = "";
            uploadContent.classList.remove('hidden');
            fileInfo.classList.add('hidden');
            inputCode.value = "";
        }

        function clearAll() {
            inputCode.value = "";
            document.getElementById('output-code').value = "";
            removeFile({ stopPropagation: () => {} });
        }

        // --- Processor Logic ---
        function setMode(mode) {
            currentMode = mode;
            const jsOpts = document.getElementById('js-options');
            const btnJs = document.getElementById('btn-js');
            const btnHtml = document.getElementById('btn-html');

            if (mode === 'js') {
                jsOpts.style.opacity = '1';
                jsOpts.style.pointerEvents = 'auto';
                btnJs.className = 'py-2 rounded-md bg-primary text-darker font-bold text-xs transition-all';
                btnHtml.className = 'py-2 rounded-md text-slate-400 font-bold text-xs transition-all hover:text-white';
            } else {
                jsOpts.style.opacity = '0.3';
                jsOpts.style.pointerEvents = 'none';
                btnHtml.className = 'py-2 rounded-md bg-primary text-darker font-bold text-xs transition-all';
                btnJs.className = 'py-2 rounded-md text-slate-400 font-bold text-xs transition-all hover:text-white';
            }
        }

        function notify(msg, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bg = type === "success" ? "bg-primary" : "bg-red-500";
            toast.className = `${bg} text-darker px-5 py-3 rounded-lg shadow-2xl font-bold text-xs flex items-center gap-3 animate-bounce`;
            toast.innerHTML = `<i class="fa-solid ${type === 'success' ? 'fa-check-double' : 'fa-triangle-exclamation'}"></i> ${msg}`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function copyOutput() {
            const out = document.getElementById('output-code');
            if (!out.value) return notify("Output kosong!", "error");
            out.select();
            document.execCommand('copy');
            notify("Berhasil disalin!");
        }

        function handleProcess(action) {
            const val = inputCode.value.trim();
            const out = document.getElementById('output-code');
            if (!val) return notify("Input kosong!", "error");

            try {
                if (currentMode === 'html') {
                    out.value = action === 'encrypt' ? encryptHTML(val) : decryptHTML(val);
                } else {
                    const type = document.getElementById('encrypt-type').value;
                    out.value = action === 'encrypt' ? encryptJS(val, type) : decryptJS(val);
                }
                notify(`${action.toUpperCase()} Selesai!`);
            } catch (e) {
                notify(e.message, "error");
            }
        }

        // --- Algorithm Implementation ---
        function encryptHTML(html) {
            let enc = btoa(unescape(encodeURIComponent(html)));
            let res = "";
            for(let i=0; i<enc.length; i++) res += String.fromCharCode(enc.charCodeAt(i) + 1);
            return `<!DOCTYPE html><html><head><script>function _(){var x="${res}",y="",i;for(i=0;i<x.length;i++)y+=String.fromCharCode(x.charCodeAt(i)-1);document.write(decodeURIComponent(escape(atob(y))))}window.onload=_<\/script></head><body></body></html>`;
        }

        function decryptHTML(code) {
            const m = code.match(/var x="(.*?)",/);
            if (!m) throw new Error("Format HTML Andri tidak ditemukan");
            let x = m[1], y = "";
            for(let i=0; i<x.length; i++) y += String.fromCharCode(x.charCodeAt(i)-1);
            return decodeURIComponent(escape(atob(y)));
        }

        function encryptJS(js, type) {
            if (type === 'andri') {
                const b = btoa(unescape(encodeURIComponent(js)));
                let r = "";
                for(let i=0; i<b.length; i++) r += String.fromCharCode(b.charCodeAt(i) + 3);
                return `/* Secure by Andri */\n(function(a,n,d,r,i){var x="${r}",y="",j;for(j=0;j<x.length;j++)y+=String.fromCharCode(x.charCodeAt(j)-3);eval(decodeURIComponent(escape(atob(y))))})();`;
            }
            
            let opts = { compact: true, controlFlowFlattening: true };
            if (type === 'high') opts.controlFlowFlatteningThreshold = 0.75;
            if (type === 'quantum') { opts.deadCodeInjection = true; opts.deadCodeInjectionThreshold = 0.4; }
            if (type === 'max') { opts.stringArray = true; opts.rotateStringArray = true; opts.selfDefending = true; }
            
            return JavaScriptObfuscator.obfuscate(js, opts).getObfuscatedCode();
        }

        function decryptJS(code) {
            const m = code.match(/var x="(.*?)",/);
            if (m && code.includes('Andri')) {
                let x = m[1], y = "";
                for(let j=0; j<x.length; j++) y += String.fromCharCode(x.charCodeAt(j)-3);
                return js_beautify(decodeURIComponent(escape(atob(y))));
            }
            return js_beautify(code);
        }
    </script>
</body>
</html>
